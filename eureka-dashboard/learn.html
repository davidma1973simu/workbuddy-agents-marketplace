<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eureka 实训系统 · Reveal 揭示阶段</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#667eea;
  --purple2:#764ba2;
  --green:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;
  --bg:#f0f4ff;
  --card:#fff;
  --text:#1e293b;
  --text2:#64748b;
  --text3:#94a3b8;
  --border:#e2e8f0;
  --radius:14px;
  --shadow:0 4px 24px rgba(102,126,234,.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
.top-nav{background:linear-gradient(135deg,var(--purple),var(--purple2));padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(102,126,234,.3)}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-back{color:rgba(255,255,255,.8);font-size:13px;text-decoration:none;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:20px;transition:.2s;cursor:pointer;background:none}
.nav-back:hover{background:rgba(255,255,255,.2);color:#fff}
.nav-title{color:#fff;font-size:17px;font-weight:700}
.nav-subtitle{color:rgba(255,255,255,.7);font-size:12px;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:10px}
.learn-badge{background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.3)}

/* RISE PROGRESS */
.rise-bar{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:0}
.rise-step{display:flex;align-items:center;flex:1}
.rise-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;transition:.3s}
.rise-dot.active{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.4)}
.rise-dot.locked{background:var(--border);color:var(--text3)}
.rise-dot.done{background:var(--green);color:#fff}
.rise-label{margin-left:8px}
.rise-label .name{font-size:13px;font-weight:600;color:var(--text)}
.rise-label .desc{font-size:11px;color:var(--text3)}
.rise-connector{flex:1;height:2px;background:var(--border);margin:0 8px;max-width:60px}
.rise-connector.done{background:var(--green)}
.rise-step.active .rise-label .name{color:var(--purple)}

/* LAYOUT */
.main{display:flex;gap:24px;padding:24px;max-width:1200px;margin:0 auto}
.sidebar{width:260px;flex-shrink:0}
.content{flex:1;min-width:0}

/* SIDEBAR */
.task-nav{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.task-nav-header{padding:16px 20px;border-bottom:1px solid var(--border)}
.task-nav-header .phase{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px}
.task-nav-header .module{font-size:14px;font-weight:700;margin-top:3px}
.task-nav-header .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.task-nav-header .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple2));border-radius:2px;transition:.5s}
.task-item{padding:14px 20px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:#f8faff}
.task-item.active{background:linear-gradient(135deg,rgba(102,126,234,.08),rgba(118,75,162,.06));border-left:3px solid var(--purple)}
.task-item.active .task-num{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff}
.task-item.done .task-num{background:var(--green);color:#fff}
.task-num{width:26px;height:26px;border-radius:50%;background:var(--border);color:var(--text2);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.task-info .task-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}
.task-info .task-status{font-size:11px;color:var(--text3);margin-top:3px}
.task-item.done .task-info .task-status{color:var(--green)}

/* DELIVERABLE TAG */
.deliverable-tag{display:inline-flex;align-items:center;gap:4px;background:#f0fdf4;color:#15803d;border:1px solid #86efac;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px}

/* TIPS */
.tips-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:16px;overflow:hidden}
.tips-header{padding:14px 18px;background:linear-gradient(135deg,#fef3c7,#fde68a);display:flex;align-items:center;gap:8px}
.tips-header .icon{font-size:16px}
.tips-header .label{font-size:13px;font-weight:700;color:#92400e}
.tips-body{padding:14px 18px}
.tip-item{font-size:12px;color:var(--text2);line-height:1.6;padding:6px 0;border-bottom:1px solid var(--border)}
.tip-item:last-child{border-bottom:none}
.tip-item::before{content:"⚠️ "}

/* CONTENT CARD */
.task-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.task-header{padding:24px 28px;background:linear-gradient(135deg,rgba(102,126,234,.06),rgba(118,75,162,.04));border-bottom:1px solid var(--border)}
.task-header .step-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px}
.task-header h2{font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px}
.task-header .objective{font-size:14px;color:var(--text2);line-height:1.7;padding:12px 16px;background:rgba(102,126,234,.06);border-radius:8px;border-left:3px solid var(--purple);margin-bottom:10px}
.task-header .deliverable-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-header .deliverable-label{font-size:12px;color:var(--text3);font-weight:600}

/* CONCEPT */
.concept-box{padding:20px 28px;border-bottom:1px solid var(--border)}
.section-label{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.concept-text{font-size:13px;color:var(--text2);line-height:1.8;background:#f8faff;padding:14px 16px;border-radius:8px}

/* STEPS */
.steps-box{padding:20px 28px;border-bottom:1px solid var(--border)}
.step-list{display:flex;flex-direction:column;gap:10px}
.step-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#f8faff;border-radius:8px;border:1px solid var(--border)}
.step-circle{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-content .step-title{font-size:13px;font-weight:700;color:var(--text)}
.step-content .step-hint{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5}

/* FORM */
.form-area{padding:20px 28px;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:22px}
.form-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.form-label .required{color:var(--red);font-size:11px}
.form-hint{font-size:12px;color:var(--text3);margin-bottom:8px;line-height:1.6;padding:8px 12px;background:#f8faff;border-radius:6px;border-left:2px solid var(--purple)}
.form-hint .example{color:var(--purple);font-style:italic;display:block;margin-top:4px}
textarea,input[type="text"]{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text);font-family:inherit;resize:vertical;transition:.2s;background:#fff;line-height:1.7}
textarea:focus,input[type="text"]:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(102,126,234,.1)}
textarea{min-height:90px}

/* MATRIX — 2×2，带轴标签 */
.matrix-wrapper{position:relative;margin-top:8px}
.matrix-axis-labels{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:4px}
.axis-label{font-size:11px;font-weight:700;color:var(--text3);text-align:center;padding:2px 0}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.matrix-cell{border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.2s;position:relative}
.matrix-cell:hover{border-color:var(--purple);background:#f8faff}
.matrix-cell.selected{border-color:var(--purple);background:rgba(102,126,234,.08);box-shadow:0 2px 10px rgba(102,126,234,.2)}
.matrix-cell .cell-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px}
.matrix-cell .cell-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.matrix-cell .cell-desc{font-size:11px;color:var(--text2);line-height:1.5}
.matrix-cell .check{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;display:none;align-items:center;justify-content:center}
.matrix-cell.selected .check{display:flex}
.q1 .cell-tag{background:#dbeafe;color:#1d4ed8}
.q2 .cell-tag{background:#dcfce7;color:#15803d}
.q3 .cell-tag{background:#fef9c3;color:#a16207}
.q4 .cell-tag{background:#fce7f3;color:#be185d}
.matrix-footnote{font-size:11px;color:var(--text3);margin-top:8px;padding:6px 10px;background:#f8faff;border-radius:6px;border-left:2px solid var(--amber)}

/* STAKEHOLDER TABLE */
.stakeholder-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
.stakeholder-table th{background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(118,75,162,.08));color:var(--text);font-weight:700;padding:10px 12px;text-align:left;border-bottom:2px solid var(--border)}
.stakeholder-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.stakeholder-table tr:hover td{background:#f8faff}
.score-input{width:56px;border:1.5px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;text-align:center;color:var(--text);font-family:inherit}
.score-input:focus{outline:none;border-color:var(--purple)}
.score-total{font-size:13px;color:var(--text2);margin-top:8px;padding:8px 12px;background:#f8faff;border-radius:6px}
.score-total .over{color:var(--red);font-weight:700}
.score-total .ok{color:var(--green);font-weight:700}

/* BRIEF PREVIEW */
.brief-preview{border:2px solid var(--purple);border-radius:12px;padding:20px 24px;background:linear-gradient(135deg,rgba(102,126,234,.03),rgba(118,75,162,.02));margin-top:8px}
.brief-title{font-size:15px;font-weight:800;color:var(--purple);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.brief-section{margin-bottom:14px}
.brief-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.brief-section-content{font-size:13px;color:var(--text);line-height:1.7;background:#fff;padding:8px 12px;border-radius:6px;border:1px solid var(--border);min-height:32px;white-space:pre-wrap}

/* FEEDBACK */
.feedback-box{padding:20px 28px;border-bottom:1px solid var(--border);display:none}
.feedback-box.show{display:block}
.feedback-score{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.score-circle{width:60px;height:60px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0}
.score-circle.high{background:linear-gradient(135deg,#dcfce7,#bbf7d0);color:#15803d;border:2px solid #86efac}
.score-circle.mid{background:linear-gradient(135deg,#fef9c3,#fde68a);color:#a16207;border:2px solid #fcd34d}
.score-circle.low{background:linear-gradient(135deg,#fee2e2,#fecaca);color:#b91c1c;border:2px solid #fca5a5}
.score-info .score-title{font-size:14px;font-weight:700;color:var(--text)}
.score-info .score-sub{font-size:12px;color:var(--text2);margin-top:3px}
.feedback-items{display:flex;flex-direction:column;gap:8px}
.feedback-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:8px 12px;border-radius:6px}
.feedback-item.good{background:#f0fdf4;color:#15803d}
.feedback-item.warn{background:#fffbeb;color:#92400e}
.feedback-item.bad{background:#fef2f2;color:#b91c1c}

/* ACTIONS */
.action-bar{padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border:none;padding:12px 28px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
.btn-secondary{background:#fff;color:var(--purple);border:1.5px solid var(--purple);padding:11px 22px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-secondary:hover{background:#f8faff}
.btn-ai{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.btn-ai:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,58,237,.4)}
.save-hint{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}

/* WARN BOX */
.misconception-box{padding:20px 28px;border-bottom:1px solid var(--border)}
.warn-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:12px 16px}
.warn-title{font-size:12px;font-weight:700;color:#92400e;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.warn-items{font-size:12px;color:#a16207;line-height:1.8}

/* COMPLETE */
.complete-banner{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:12px;padding:20px 24px;margin:20px 28px;display:none}
.complete-banner.show{display:flex;align-items:center;gap:16px}
.complete-icon{font-size:36px}
.complete-text .title{font-size:16px;font-weight:800;color:#15803d}
.complete-text .sub{font-size:13px;color:#166534;margin-top:4px}
.btn-next{background:linear-gradient(135deg,var(--green),#059669);color:#fff;border:none;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;margin-left:auto;white-space:nowrap}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(16,185,129,.4)}

/* AI MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.ai-panel{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:75vh;display:flex;flex-direction:column;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ai-panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ai-panel-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.ai-panel-close{background:var(--border);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--text2)}
.ai-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-line}
.ai-msg.bot{background:#f0f4ff;color:var(--text);border-bottom-left-radius:4px;align-self:flex-start}
.ai-msg.user{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.ai-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px}
.ai-input{flex:1;border:1.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;font-family:inherit;outline:none}
.ai-input:focus{border-color:var(--purple)}
.ai-send{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.3s;z-index:2000;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  .main{flex-direction:column;padding:16px}
  .sidebar{width:100%}
  .rise-label .desc{display:none}
  .matrix-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="top-nav">
  <div class="nav-left">
    <button class="nav-back" onclick="window.location.href='https://eureka-landing.zh-cn.edgeone.cool/'">← 返回 Eureka</button>
    <div>
      <div class="nav-title">Eureka 实训系统</div>
      <div class="nav-subtitle">边做边学，掌握 RISE 价值创新全流程</div>
    </div>
  </div>
  <div class="nav-right">
    <span class="learn-badge">📚 学习模式</span>
    <span class="learn-badge" id="save-status">● 自动保存</span>
  </div>
</nav>

<!-- RISE BAR -->
<div class="rise-bar">
  <div class="rise-step active">
    <div class="rise-dot active">R</div>
    <div class="rise-label">
      <div class="name">Reveal · 揭示</div>
      <div class="desc">团队共识与用户洞察</div>
    </div>
  </div>
  <div class="rise-connector"></div>
  <div class="rise-step">
    <div class="rise-dot locked">I</div>
    <div class="rise-label">
      <div class="name">Inspire · 启发</div>
      <div class="desc">创新机遇与创意想法</div>
    </div>
  </div>
  <div class="rise-connector"></div>
  <div class="rise-step">
    <div class="rise-dot locked">S</div>
    <div class="rise-label">
      <div class="name">Shape · 构建</div>
      <div class="desc">方案构建与用户体验</div>
    </div>
  </div>
  <div class="rise-connector"></div>
  <div class="rise-step">
    <div class="rise-dot locked">E</div>
    <div class="rise-label">
      <div class="name">Exam · 验证</div>
      <div class="desc">原型构建与价值验证</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="task-nav">
      <div class="task-nav-header">
        <div class="phase">Reveal · 模块一</div>
        <div class="module">团队构建共识</div>
        <div class="progress-bar"><div class="progress-fill" id="module-progress" style="width:0%"></div></div>
      </div>
      <div class="task-item active" id="nav-t1" onclick="switchTask(1)">
        <div class="task-num" id="num-t1">1</div>
        <div class="task-info">
          <div class="task-name">明确创新主题</div>
          <div class="task-status" id="status-t1">进行中</div>
        </div>
      </div>
      <div class="task-item" id="nav-t2" onclick="switchTask(2)">
        <div class="task-num" id="num-t2">2</div>
        <div class="task-info">
          <div class="task-name">背景挑战研究</div>
          <div class="task-status" id="status-t2">未开始</div>
        </div>
      </div>
      <div class="task-item" id="nav-t3" onclick="switchTask(3)">
        <div class="task-num" id="num-t3">3</div>
        <div class="task-info">
          <div class="task-name">团队构建共识</div>
          <div class="task-status" id="status-t3">未开始</div>
        </div>
      </div>
    </div>
    <div class="tips-card" id="tips-card">
      <div class="tips-header"><span class="icon">⚠️</span><span class="label">常见误区</span></div>
      <div class="tips-body" id="tips-body"></div>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="content" id="task-content"></main>

</div>

<!-- AI MODAL -->
<div class="modal-overlay" id="ai-modal">
  <div class="ai-panel">
    <div class="ai-panel-header">
      <div class="ai-panel-title">🤖 Eureka Coach · AI 辅导</div>
      <button class="ai-panel-close" onclick="closeAI()">✕</button>
    </div>
    <div class="ai-messages" id="ai-messages"></div>
    <div class="ai-input-row">

let state = {

function loadState() {
  const s = localStorage.getItem(STORAGE_KEY);
  if (s) { try { state = JSON.parse(s); } catch(e) {} }
  if (!state.stakeholderScores) {
    state.stakeholderScores = STAKEHOLDER_TEMPLATE.map(() => [3,3,3,3]);
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const el = document.getElementById('save-status');
  if (el) { el.textContent = '✓ 已保存'; setTimeout(() => { el.textContent = '● 自动保存'; }, 2000); }
}

function switchTask(n) {
  state.currentTask = n;
  renderAll();
  saveState();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ────────────────────────────────────────────────
//  渲染
// ────────────────────────────────────────────────
function renderAll() {
  renderSidebar();
  renderTaskContent();
  renderTips();
  updateProgress();
}

function renderSidebar() {
  [1,2,3].forEach(n => {
    const nav = document.getElementById('nav-t' + n);
    const num = document.getElementById('num-t' + n);
    const st  = document.getElementById('status-t' + n);
    const ts  = state.tasks[n].status;
    nav.className = 'task-item' + (state.currentTask === n ? ' active' : '') + (ts === 'done' ? ' done' : '');
    num.textContent = ts === 'done' ? '✓' : n;
    st.textContent  = ts === 'done' ? '✅ 已完成' : (state.currentTask === n ? '进行中' : '未开始');
  });
}

function updateProgress() {
  const done = [1,2,3].filter(n => state.tasks[n].status === 'done').length;
  const el = document.getElementById('module-progress');
  if (el) el.style.width = (done / 3 * 100) + '%';
}

function renderTips() {
  const task = TASKS[state.currentTask];
  const body = document.getElementById('tips-body');
  body.innerHTML = task.misconceptions.map(m => `<div class="tip-item">${m}</div>`).join('');
}

function renderTaskContent() {
  const n    = state.currentTask;
  const task = TASKS[n];
  const data = state.tasks[n].data || {};
  const isDone = state.tasks[n].status === 'done';

  let fieldsHtml = '';
  task.fields.forEach(f => {
    const val = data[f.id] || '';
    if (f.type === 'matrix') {
      fieldsHtml += renderMatrix(f, val);
    } else if (f.type === 'stakeholder') {
      fieldsHtml += renderStakeholderTable(f);
    } else if (f.type === 'textarea') {
      fieldsHtml += `
      <div class="form-group">
        <div class="form-label">${f.label} <span class="required">必填</span></div>
        <div class="form-hint">${f.hint}<span class="example">${f.example}</span></div>
        <textarea id="field-${f.id}" rows="${f.rows||4}" placeholder="在这里输入..." ${isDone?'readonly':''}>${val}</textarea>
      </div>`;
    } else {
      fieldsHtml += `
      <div class="form-group">
        <div class="form-label">${f.label} <span class="required">必填</span></div>
        <div class="form-hint">${f.hint}<span class="example">${f.example}</span></div>
        <input type="text" id="field-${f.id}" value="${val}" placeholder="在这里输入..." ${isDone?'readonly':''}>
      </div>`;
    }
  });

  // 任务 3 额外：项目简报预览
  const briefPreview = n === 3 ? renderBriefPreview(data) : '';

  const completeBanner = isDone ? `
  <div class="complete-banner show">
    <div class="complete-icon">🎉</div>
    <div class="complete-text">
      <div class="title">任务完成！产出：${task.deliverable}</div>
      <div class="sub">${task.successStandard}</div>

function updateScore(input) {
  const si = parseInt(input.dataset.si);
  const ni = parseInt(input.dataset.ni);
  const val = parseInt(input.value) || 0;
  if (!state.stakeholderScores) state.stakeholderScores = STAKEHOLDER_TEMPLATE.map(()=>[3,3,3,3]);
  state.stakeholderScores[si][ni] = val;
  const total = state.stakeholderScores[si].reduce((a,b)=>a+b,0);
  const rowEl = document.getElementById('row-total-' + si);
  if (rowEl) {
    rowEl.textContent = total + '/12';
    rowEl.style.color = total === 12 ? 'var(--green)' : 'var(--red)';
  }
  saveState();
}

// ────────────────────────────────────────────────
function collectFormData() {
  const n    = state.currentTask;
  const task = TASKS[n];
  const data = {};
  task.fields.forEach(f => {
    if (f.type === 'matrix') {
      data[f.id] = state.matrixSelected || '';
    } else if (f.type === 'stakeholder') {
      data[f.id] = JSON.stringify(state.stakeholderScores || []);
    } else {
      const el = document.getElementById('field-' + f.id);
      if (el) data[f.id] = el.value.trim();
    }
  });
  return data;
}

function saveDraft() {
  state.tasks[state.currentTask].data = collectFormData();
  saveState();
  showToast('草稿已保存 ✓');
}

function submitTask() {
  const data = collectFormData();
  const n    = state.currentTask;

  // 必填校验
  const textFields = TASKS[n].fields.filter(f => f.type !== 'matrix' && f.type !== 'stakeholder');
  const empty = textFields.filter(f => !data[f.id]);
  if (empty.length > 0) { showToast('请填写所有必填项后再提交'); return; }
  if (n === 1 && !state.matrixSelected) { showToast('请选择主题矩阵象限'); return; }
  if (n === 3 && state.stakeholderScores) {
    const invalid = state.stakeholderScores.some(row => row.reduce((a,b)=>a+b,0) !== 12);
    if (invalid) { showToast('请确保每位利益方的分配总和等于 12 分'); return; }
  }

  state.tasks[n].data = data;
  showFeedback(data);
}

// ────────────────────────────────────────────────
//  即时反馈
// ────────────────────────────────────────────────
function showFeedback(data) {
  const n = state.currentTask;
  let score = 80;
  let items = [];

  if (n === 1) {
    const desc = data.topic_description || '';
    const challenges = data.personal_challenges || '';
    // 一句话描述结构检查
    if (desc.length >= 40) { score += 5; items.push({ type:'good', text:'主题描述篇幅充分，包含足够上下文' }); }
    else { score -= 8; items.push({ type:'warn', text:'主题描述偏短，建议补充场景/用户/目的的细节' }); }
    const hasStructure = ['场景','背景','为了','解决','达成','目标','目的','问题'].some(w => desc.includes(w));
    if (hasStructure) { items.push({ type:'good', text:'描述结构良好，涵盖了场景或目的要素' }); }
    else { score -= 5; items.push({ type:'warn', text:'建议按「场景 + 用户 + 问题 + 目的」结构重新组织描述' }); }
    const rows = challenges.split('\n').filter(l=>l.trim()).length;
    if (rows >= 3) { items.push({ type:'good', text:`收集了 ${rows} 条个人挑战，聚类基础扎实` }); }
    else { score -= 5; items.push({ type:'warn', text:'建议收集更多成员的个人挑战（至少 3 条，每人 1 条）' }); }
    if (!state.matrixSelected) { score -= 10; items.push({ type:'bad', text:'未选择主题矩阵象限，请补充定位' }); }
    else { items.push({ type:'good', text:'使用创新主题矩阵完成了方向定位，选题更清晰' }); }
  }

  else if (n === 2) {
    const situation = data.current_situation || '';
    const users = data.target_users || '';
    const constraints = data.constraints || '';
    if (/\d+%|\d+人|\d+天|\d+元|\d+月/.test(situation)) {
      score += 8; items.push({ type:'good', text:'现状描述包含量化数据，事实依据充分' });
    } else {
      score -= 8; items.push({ type:'warn', text:'建议在现状描述中加入具体数字（比例、人数、时间、成本等）' });
    }
    if (users.length >= 20) { items.push({ type:'good', text:'目标用户描述具体，包含岗位/阶段/特征' }); }
    else { score -= 5; items.push({ type:'warn', text:'目标用户描述可以更具体，建议包含岗位+阶段+关键特征' }); }
    if (constraints.length >= 15) { items.push({ type:'good', text:'考虑了现实限制要素，方案更接地气' }); }
    else { score -= 5; items.push({ type:'warn', text:'建议补充影响和限制要素（资源、时间、文化、政策等）' }); }
    // 6字段完整性
    const allFilled = ['background_info','current_situation','target_users','expected_outcome','challenges','constraints'].every(id=>data[id]&&data[id].length>5);
    if (allFilled) { score += 5; items.push({ type:'good', text:'6 个背景要素全部填写，结构完整' }); }
    else { score -= 5; items.push({ type:'bad', text:'部分背景要素未填写，请检查 6 个字段是否都有内容' }); }
  }

  else if (n === 3) {
    const hypo = data.pb_hypotheses || '';
    const hypoLines = hypo.split('\n').filter(l=>l.trim().length>5);
    if (hypoLines.length >= 3) { score += 5; items.push({ type:'good', text:`列出了 ${hypoLines.length} 条待验证假设，维度充分` }); }
    else { score -= 10; items.push({ type:'warn', text:'建议至少列出 3 条假设，分别涵盖用户/技术/商业维度' }); }
    const hasFormat = hypo.includes('如果') || hypo.includes('则') || hypo.includes('相信');
    if (hasFormat) { items.push({ type:'good', text:'假设格式规范，包含条件和预期结果，易于验证' }); }
    else { score -= 5; items.push({ type:'warn', text:'假设格式建议：「我们相信...，如果...，则...」，便于后续验证' }); }
    const hasMultiDim = ['用户','技术','商业','利益方'].filter(k=>hypo.includes(k)).length;
    if (hasMultiDim >= 3) { items.push({ type:'good', text:'假设涵盖多个维度（用户/技术/商业），全面均衡' }); }
    else { score -= 5; items.push({ type:'warn', text:`假设维度建议更丰富，已覆盖 ${hasMultiDim}/4 个维度` }); }
    if (data.pb_vision && data.pb_vision.length >= 20) { items.push({ type:'good', text:'项目愿景描述完整，指向清晰' }); }
    else { score -= 5; items.push({ type:'warn', text:'项目愿景描述偏短，建议说明「为谁、解决什么、带来什么价值」' }); }
  }

  score = Math.min(100, Math.max(0, score));
  const level = score >= 85 ? 'high' : score >= 70 ? 'mid' : 'low';
  const levelText = score >= 85 ? '优秀' : score >= 70 ? '良好，可继续' : '需改进';

  const feedbackBox = document.getElementById('feedback-box');
  feedbackBox.className = 'feedback-box show';
  feedbackBox.innerHTML = `
    <div class="section-label">📊 即时反馈</div>
    <div class="feedback-score">
      <div class="score-circle ${level}">${score}<span style="font-size:10px;font-weight:400">/100</span></div>
      <div class="score-info">
        <div class="score-title">${levelText}</div>
        <div class="score-sub">产出物：${TASKS[n].deliverable}</div>
      </div>
    </div>
    <div class="feedback-items">
      ${items.map(i=>`<div class="feedback-item ${i.type}">${i.type==='good'?'✅':i.type==='warn'?'⚠️':'❌'} ${i.text}</div>`).join('')}
    </div>
    <div style="margin-top:14px;display:flex;gap:10px">
      ${score >= 70
        ? `<button class="btn-primary" onclick="confirmComplete()">✓ 确认完成，保存产出物</button>
           <button class="btn-secondary" onclick="document.getElementById('feedback-box').className='feedback-box'">修改后再提交</button>`
        : `<button class="btn-secondary" onclick="document.getElementById('feedback-box').className='feedback-box'">继续修改</button>`}
    </div>`;
  feedbackBox.scrollIntoView({ behavior:'smooth', block:'center' });
}

function addAIMessage(text, role) {
  const msgs = document.getElementById('ai-messages');
  const el = document.createElement('div');
  el.className = `ai-msg ${role}`;
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

  addAIMessage(text, 'user');

  setTimeout(() => {
    const n = state.currentTask;

    if (n === 1) {
      const replies = [
        '好问题！区分「良构」和「劣构」是关键。\n\n如果你一眼就能说出解决方案，那很可能是良构问题，不太适合创新探索。\n\n劣构问题的特征：每次讨论都能发现新角度，没有唯一正确答案，解决方案取决于视角和假设。\n\n你们目前的主题有这个特征吗？',
        '聚类的诀窍是找「深层需求」而不是「表面问题」。\n\n比如「培训效果差」和「员工晋升慢」看似不同，但背后可能都指向「技能转化路径不清晰」。\n\n试着问：这些挑战背后，团队真正想解决的是什么？',
        '矩阵选象限不是找「最准确的」，而是找「最能激发创新的角度」。\n\n如果你们是技术团队，试着从「服务体验」象限看问题；如果是业务团队，试着从「商业模式」角度想想。换个视角往往有惊喜。',
      ];
      reply = replies[Math.floor(Math.random() * replies.length)];
    } else if (n === 2) {
      const replies = [
        '现状描述缺乏数据是很普遍的问题。\n\n可以试试这个方法：把你的描述读给一个不了解这个问题的人听，如果他们不理解「有多严重」，说明你需要更多数据。\n\n哪怕是估算也比没有强：「大约 60% 的用户反映...」比「很多用户说...」有力多了。',
        '目标用户界定太宽是典型的「设计给所有人」陷阱。\n\n试着描述一个具体的人：\n「32 岁的张雪，刚从应届生升为基层销售，在北京工作，每天跑 3-4 个客户，最大的压力是月底的 KPI...」\n这样的具体描述能让团队快速对齐。',
        '限制条件很重要！它决定了你的解决方案是否真的可落地。\n\n最常被忽视的限制：\n• 时间限制（用户愿意花多少时间学习？）\n• 行为习惯（他们现在是怎么做的？）\n• 文化因素（有哪些「不成文的规则」？）',
      ];
      reply = replies[Math.floor(Math.random() * replies.length)];
    } else {
      const replies = [
        '12 分制的精髓在于「强迫选择」。\n\n当一位利益方说「每个需求都很重要」时，12 分制会逼他们表态。\n\n通常，第一轮分数会比较平均（3-3-3-3），但让他们解释每个分数背后的理由，往往会发现真实的优先级。',
        '待验证假设最容易犯的错误是「写成目标」而不是「写成假设」。\n\n目标：「我们要提升开单率到 40%」\n假设：「我们相信，如果用真实客户场景替代角色扮演，60天开单率会从15%提升到40%，这个假设需要通过 A/B 测试验证」\n\n区别：假设是「我们不确定，但这是我们的猜测」，需要后续验证。',

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

// ── Init ──
loadState();
renderAll();
</script>
</body>
</html>
