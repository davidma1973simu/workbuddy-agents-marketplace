<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Lab · 创新虚拟人市场</title>
<style>
/* ─────────────────────────────────────────
   CSS Variables & Reset
───────────────────────────────────────── */
:root {
  --bg:        #0f1117;
  --bg2:       #161b27;
  --bg3:       #1e2535;
  --border:    #2a3347;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #64748b;
  --accent:    #6366f1;
  --accent2:   #818cf8;
  --green:     #10b981;
  --orange:    #f59e0b;
  --red:       #ef4444;
  --pink:      #ec4899;
  --teal:      #14b8a6;
  --radius:    12px;
  --radius-sm: 8px;
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
  --sidebar-w: 220px;
  --nav-h:     58px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, textarea { font-family: inherit; }

/* ─────────────────────────────────────────
   Layout
───────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* NAV */
nav {
  height: var(--nav-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 8px;
  flex-shrink: 0;
  z-index: 100;
}
.nav-logo {
  font-size: 17px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: -0.3px;
  margin-right: 12px;
}
.nav-logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 6px; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  color: var(--text2);
  transition: all .2s;
}
.nav-tab:hover { background: var(--bg3); color: var(--text); }
.nav-tab.active { background: var(--accent); color: #fff; }
.nav-spacer { flex: 1; }
.nav-btn {
  padding: 7px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text2);
  transition: all .2s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent2); }
.nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.nav-btn.primary:hover { background: var(--accent2); }

/* BODY */
.body-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* SIDEBAR */
aside {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 12px;
}
.sidebar-section { margin-bottom: 20px; }
.sidebar-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
  padding: 0 4px;
}
.tag-group { display: flex; flex-direction: column; gap: 2px; }
.tag-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .15s;
  font-size: 13px;
  color: var(--text2);
}
.tag-item:hover { background: var(--bg3); }
.tag-item input[type=checkbox] {
  accent-color: var(--accent);
  width: 14px; height: 14px;
  flex-shrink: 0;
}
.tag-item.checked { color: var(--text); }
.tag-add {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  padding: 4px 6px;
}
.tag-add input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 12px;
  color: var(--text);
  outline: none;
}
.tag-add input:focus { border-color: var(--accent); }
.tag-add button {
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 12px;
  transition: background .15s;
}
.tag-add button:hover { background: var(--accent2); }

/* MAIN */
main {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ─────────────────────────────────────────
   Theme Input Panel
───────────────────────────────────────── */
.theme-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.theme-panel-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.theme-panel-title .icon { font-size: 18px; }
.theme-row { display: flex; gap: 10px; margin-bottom: 10px; }
.theme-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.theme-input:focus { border-color: var(--accent); }
.theme-input::placeholder { color: var(--text3); }
.theme-textarea {
  resize: none;
  height: 60px;
  line-height: 1.5;
}
.generate-btn {
  padding: 10px 24px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all .2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.generate-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,.4); }
.generate-btn:active { transform: translateY(0); }
.generate-btn.loading { opacity: .7; pointer-events: none; }
.generate-btn .spin { animation: spin .8s linear infinite; display: inline-block; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

/* 一键清除按钮 */
.clear-btn {
  padding: 10px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text3);
  white-space: nowrap;
  transition: all .2s;
  flex-shrink: 0;
}
.clear-btn:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,.05); }

/* 标签确认区 */
.tag-confirm {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-top: 10px;
  display: none;
}
.tag-confirm.visible { display: block; }
.tag-confirm-title {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tag-chips-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.tag-chip {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  border: 1px solid;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: all .15s;
}
.tag-chip.industry { background: rgba(99,102,241,.15); border-color: var(--accent); color: var(--accent2); }
.tag-chip.scene    { background: rgba(20,184,166,.15); border-color: var(--teal); color: var(--teal); }
.tag-chip.theme    { background: rgba(245,158,11,.15); border-color: var(--orange); color: var(--orange); }
.tag-chip .remove { opacity: .6; font-size: 11px; }
.tag-chip .remove:hover { opacity: 1; }
.confirm-btns { display: flex; gap: 8px; margin-top: 10px; }
.confirm-btn {
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 13px;
  transition: all .15s;
}
.confirm-btn.ok { background: var(--accent); color: #fff; }
.confirm-btn.ok:hover { background: var(--accent2); }
.confirm-btn.cancel { background: var(--bg); border: 1px solid var(--border); color: var(--text2); }
.confirm-btn.cancel:hover { border-color: var(--text2); }

/* ─────────────────────────────────────────
   Category Tabs
───────────────────────────────────────── */
.cat-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg2);
  padding: 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
}
.cat-tab {
  flex: 1;
  padding: 8px 10px;
  border-radius: 7px;
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.cat-tab:hover { background: var(--bg3); color: var(--text); }
.cat-tab.active { background: var(--bg3); color: var(--text); font-weight: 600; }
.cat-tab .badge {
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  font-size: 10px;
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
}

/* ─────────────────────────────────────────
   Persona Rows Layout (4类分行)
───────────────────────────────────────── */
.persona-rows { display: flex; flex-direction: column; gap: 0; }

/* 每个类别行 */
.persona-row {
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
}

/* 行标题头部 */
.row-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.row-header:hover { filter: brightness(1.05); }

/* 不同类别底色（行标题底色） */
.row-target_user    { background: rgba(99,102,241,.18); }
.row-extreme_user   { background: rgba(236,72,153,.14); }
.row-stakeholder    { background: rgba(20,184,166,.14); }
.row-decision_maker { background: rgba(245,158,11,.14); }
.row-resource_provider { background: rgba(6,182,212,.14); }

/* 行标题左侧色条 */
.row-accent-bar { width: 4px; height: 32px; border-radius: 3px; flex-shrink: 0; }
.row-target_user    .row-accent-bar { background: linear-gradient(180deg, var(--accent), #8b5cf6); }
.row-extreme_user   .row-accent-bar { background: linear-gradient(180deg, var(--pink), #f97316); }
.row-stakeholder    .row-accent-bar { background: linear-gradient(180deg, var(--teal), var(--green)); }
.row-decision_maker .row-accent-bar { background: linear-gradient(180deg, var(--orange), #f97316); }
.row-resource_provider .row-accent-bar { background: linear-gradient(180deg, #06b6d4, var(--teal)); }

/* 角色类型标签 — 大字凸显 */
.row-type-label {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.5px;
  flex: 0 0 auto;
}
.row-target_user    .row-type-label { color: var(--accent2); }
.row-extreme_user   .row-type-label { color: var(--pink); }
.row-stakeholder    .row-type-label { color: var(--teal); }
.row-decision_maker .row-type-label { color: var(--orange); }
.row-resource_provider .row-type-label { color: #22d3ee; }

.row-type-icon { font-size: 22px; }
.row-count {
  font-size: 12px;
  color: var(--text3);
  background: rgba(0,0,0,.2);
  padding: 2px 8px;
  border-radius: 10px;
}
.row-toggle {
  margin-left: auto;
  font-size: 14px;
  color: var(--text3);
  transition: transform .2s;
}
.row-toggle.collapsed { transform: rotate(-90deg); }

/* 行内卡片容器 */
.row-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  padding: 14px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
}
.row-cards.hidden { display: none; }

/* 卡片类型标签（卡片右上角）— 加大加粗 */
.card-type-badge {
  font-size: 12px !important;
  font-weight: 700 !important;
  padding: 3px 10px !important;
  border-radius: 10px;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.type-target_user    .card-type-badge { background: rgba(99,102,241,.2);  color: var(--accent2); border: 1px solid rgba(99,102,241,.4); }
.type-extreme_user   .card-type-badge { background: rgba(236,72,153,.2);  color: var(--pink);    border: 1px solid rgba(236,72,153,.4); }
.type-stakeholder    .card-type-badge { background: rgba(20,184,166,.2);  color: var(--teal);    border: 1px solid rgba(20,184,166,.4); }
.type-decision_maker .card-type-badge { background: rgba(245,158,11,.2);  color: var(--orange);  border: 1px solid rgba(245,158,11,.4); }
.type-resource_provider .card-type-badge { background: rgba(6,182,212,.2); color: #22d3ee;       border: 1px solid rgba(6,182,212,.4); }

/* 旧的 cards-grid 保留，用于市场浏览 */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

/* 侧边栏标签高亮（AI生成后反向高亮） */
.tag-item.highlighted {
  background: rgba(99,102,241,.15);
  color: var(--accent2);
  font-weight: 600;
  border-radius: var(--radius-sm);
}
.tag-item.highlighted input[type=checkbox] { accent-color: var(--accent2); }

/* 无主题模式：标签筛选后的创建按钮 */
.sidebar-create-btn {
  width: 100%;
  margin-top: 12px;
  padding: 10px 0;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  transition: all .2s;
  display: none;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 2px 12px rgba(99,102,241,0.35);
  position: relative;
  overflow: hidden;
}
.sidebar-create-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: translateX(-100%);
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  100% { transform: translateX(100%); }
}
.sidebar-create-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,.5); }
.sidebar-create-btn.visible { display: block; }

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state .big { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ─────────────────────────────────────────
   Persona Card
───────────────────────────────────────── */
.persona-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all .2s;
  position: relative;
}
.persona-card:hover { border-color: #3a4560; transform: translateY(-2px); box-shadow: var(--shadow); }

/* 顶部色带（按类型区分颜色） */
.card-stripe { height: 4px; }
.type-target_user      .card-stripe { background: linear-gradient(90deg, var(--accent), #8b5cf6); }
.type-extreme_user     .card-stripe { background: linear-gradient(90deg, var(--pink), #f97316); }
.type-stakeholder      .card-stripe { background: linear-gradient(90deg, var(--teal), var(--green)); }
.type-decision_maker   .card-stripe { background: linear-gradient(90deg, var(--orange), #f97316); }
.type-resource_provider .card-stripe { background: linear-gradient(90deg, #06b6d4, var(--teal)); }

.card-body { padding: 14px; }

/* 卡片头部 */
.card-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}
.card-avatar {
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,.08);
  box-shadow: 0 2px 8px rgba(0,0,0,.35);
}
.card-avatar svg { width: 60px; height: 60px; display: block; }
.card-identity { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 600; color: var(--text); }
.card-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
.card-type-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg3);
  color: var(--text3);
  white-space: nowrap;
}
.edited-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  background: rgba(245,158,11,.15);
  color: var(--orange);
  margin-left: 4px;
}
.preset-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  background: rgba(99,102,241,.12);
  color: var(--accent);
  margin-left: 4px;
  font-weight: 500;
}
.view-toggle {
  background: none;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  transition: all .15s;
  font-weight: 500;
}
.view-toggle.active {
  background: var(--bg);
  color: var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}
.view-toggle:hover:not(.active) { color: var(--text); }

/* 项目分组卡片（按项目组视图） */
.browse-group-block {
  margin-bottom: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.browse-group-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--bg2);
  cursor: pointer;
  user-select: none;
}
.browse-group-header:hover { background: var(--bg3); }
.browse-group-title { font-size: 14px; font-weight: 700; flex: 1; }
.browse-group-meta { font-size: 11px; color: var(--text3); }
.browse-group-toggle { font-size: 13px; color: var(--text3); transition: transform .2s; }
.browse-group-toggle.open { transform: rotate(90deg); }
.browse-group-body { display: none; padding: 12px; }
.browse-group-body.open { display: block; }
.browse-group-body .cards-grid { margin: 0; gap: 10px; }

/* 卡片模块区 */
.card-module { margin-bottom: 8px; }
.card-module-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}
.card-module-content {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}
.card-module-content.highlight { color: var(--text); }

/* Quote */
.card-quote {
  background: var(--bg3);
  border-left: 3px solid var(--accent);
  padding: 8px 10px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  font-style: italic;
  margin: 8px 0;
}

/* 摘要 */
.card-summary {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 8px;
}

/* 标签行 */
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.card-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg3);
  color: var(--text3);
}

/* 影响力/量化指标 */
.card-metrics { display: flex; gap: 8px; margin: 6px 0; flex-wrap: wrap; }
.metric-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg3);
  border-radius: 8px;
  padding: 6px 10px;
  min-width: 60px;
}
.metric-value {
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
}
.metric-value.positive { color: var(--green); }
.metric-value.negative { color: var(--red); }
.metric-value.neutral  { color: var(--text3); }
.metric-value.level1 { color: #94a3b8; }
.metric-value.level2 { color: var(--orange); }
.metric-value.level3 { color: var(--green); }
.metric-label { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* 极端用户连线标识 */
.extreme-link {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
}
.extreme-link .arrow { color: var(--pink); }
.extreme-link .target-name {
  color: var(--accent2);
  cursor: pointer;
  text-decoration: underline dotted;
}

/* 卡片底部操作 */
.card-actions {
  display: flex;
  gap: 6px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,.1);
}
.card-action-btn {
  flex: 1;
  padding: 6px 0;
  border-radius: 6px;
  font-size: 12px;
  text-align: center;
  border: 1px solid var(--border);
  color: var(--text2);
  transition: all .15s;
}
.card-action-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,.08); }
.card-action-btn.add-to-group { background: rgba(99,102,241,.12); border-color: var(--accent); color: var(--accent2); }
.card-action-btn.added { background: rgba(16,185,129,.12); border-color: var(--green); color: var(--green); }
.card-action-btn.restore { color: var(--orange); border-color: var(--orange); }
.card-action-btn.restore:hover { background: rgba(245,158,11,.1); }

/* ─────────────────────────────────────────
   Detail Drawer
───────────────────────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: none;
  backdrop-filter: blur(2px);
}
.drawer-overlay.open { display: block; }
.drawer {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 460px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 201;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer.open { transform: translateX(0); }
.drawer-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.drawer-title { flex: 1; font-size: 16px; font-weight: 600; }
.drawer-close {
  width: 30px; height: 30px;
  border-radius: 6px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.drawer-close:hover { background: var(--border); color: var(--text); }
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.drawer-section { margin-bottom: 20px; }
.drawer-section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.field-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}
.field-label { font-size: 12px; color: var(--text3); }
.field-value {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  padding: 6px 10px;
  background: var(--bg3);
  border-radius: 6px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: border-color .15s;
  min-height: 36px;
  white-space: pre-wrap;
}
.field-value:hover { border-color: var(--border); }
.field-value.editing { border-color: var(--accent); outline: none; background: var(--bg); }
.field-edit-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  line-height: 1.5;
  resize: none;
  font-family: inherit;
}
.drawer-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.drawer-footer-btn {
  flex: 1;
  padding: 9px;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  border: 1px solid var(--border);
  color: var(--text2);
  transition: all .15s;
}
.drawer-footer-btn:hover { border-color: var(--accent); color: var(--accent2); }
.drawer-footer-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.drawer-footer-btn.primary:hover { background: var(--accent2); }
.drawer-footer-btn.restore { color: var(--orange); border-color: var(--orange); }
.drawer-footer-btn.restore:hover { background: rgba(245,158,11,.1); }

/* ─────────────────────────────────────────
   Group Tray (底部角色组托盘)
───────────────────────────────────────── */
.group-tray {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  transform: translateY(100%);
  transition: transform .3s;
  z-index: 150;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.group-tray.open { transform: translateY(0); }
.tray-title { font-size: 13px; color: var(--text2); white-space: nowrap; }
.tray-chips { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; overflow: hidden; max-height: 40px; }
.tray-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.tray-chip .remove { cursor: pointer; color: var(--text3); }
.tray-chip .remove:hover { color: var(--red); }
.tray-actions { display: flex; gap: 8px; }
.tray-btn {
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 13px;
  border: 1px solid var(--border);
  color: var(--text2);
  transition: all .15s;
  white-space: nowrap;
}
.tray-btn:hover { border-color: var(--accent); color: var(--accent2); }
.tray-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.tray-btn.primary:hover { background: var(--accent2); }

/* ─────────────────────────────────────────
   Loading Skeleton
───────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  height: 220px;
}

/* ─────────────────────────────────────────
   Responsive
───────────────────────────────────────── */
@media (max-width: 768px) {
  aside { display: none; }
  .drawer { width: 100%; }
  .cards-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  nav { padding: 0 12px; }
  main { padding: 12px; }
}

/* ─────────────────────────────────────────
   Toast Notification
───────────────────────────────────────── */
.toast-wrap {
  position: fixed;
  top: 70px; right: 20px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text);
  box-shadow: var(--shadow);
  animation: slideIn .2s ease;
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.success { border-color: var(--green); }
.toast.error   { border-color: var(--red); }
@keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
</style>
</head>
<body>
<div id="app">

  <!-- NAV -->
  <nav>
    <div class="nav-logo">Persona Lab <span>创新虚拟人市场</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchMode('generate')" id="tab-generate">✨ AI 生成</button>
      <button class="nav-tab" onclick="switchMode('browse')" id="tab-browse">🗂 市场浏览</button>
      <button class="nav-tab" onclick="switchMode('groups')" id="tab-groups">📦 我的角色组</button>
    </div>
    <div class="nav-spacer"></div>
    <button class="nav-btn" onclick="openAIConfig()" id="ai-config-btn" title="配置 AI 大模型 API">⚙️ AI 设置</button>
    <button class="nav-btn" onclick="window.open('../eureka-dashboard/','_blank')">← 返回 Eureka</button>
  </nav>

  <div class="body-wrap">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">行业</div>
        <div class="tag-group" id="tag-list-industry"></div>
        <div class="tag-add">
          <input type="text" id="input-industry" placeholder="添加行业…" onkeydown="handleTagEnter(event,'industry')">
          <button onclick="addTag('industry')">+</button>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">场景</div>
        <div class="tag-group" id="tag-list-scene"></div>
        <div class="tag-add">
          <input type="text" id="input-scene" placeholder="添加场景…" onkeydown="handleTagEnter(event,'scene')">
          <button onclick="addTag('scene')">+</button>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">主题</div>
        <div class="tag-group" id="tag-list-theme"></div>
        <div class="tag-add">
          <input type="text" id="input-theme" placeholder="添加主题…" onkeydown="handleTagEnter(event,'theme')">
          <button onclick="addTag('theme')">+</button>
        </div>
      </div>

      <!-- 无主题模式：标签选中后出现创建按钮 -->
      <button class="sidebar-create-btn" id="sidebar-create-btn" onclick="generateFromTags()">
        ✨ 基于当前标签创建角色
      </button>
    </aside>

    <!-- MAIN -->
    <main id="main-content">

      <!-- 模式B：AI 生成 -->
      <div id="panel-generate">
        <div class="theme-panel">
          <div class="theme-panel-title">
            <span class="icon">✨</span>
            输入项目主题，直接生成五类角色组
          </div>
          <div class="theme-row">
            <input class="theme-input" id="input-theme-main"
              placeholder="项目主题，例如：医疗 · 慢病管理 · 老龄化用户"
              onkeydown="if(event.key==='Enter')startGenerate()">
            <button class="clear-btn" id="clear-btn" onclick="clearAll()" title="清除主题和标签选择">✕ 清除</button>
            <button class="generate-btn" id="generate-btn" onclick="startGenerate()">
              <span id="generate-icon">✨</span> 一键生成
            </button>
          </div>
          <textarea class="theme-input theme-textarea" id="input-background"
            placeholder="补充背景（选填）：例如用户入店后面对大量款式术语，导致决策困难、成交率低"></textarea>
          <textarea class="theme-input theme-textarea" id="input-assumption"
            placeholder="用户假设（选填）：例如主力人群是25-35岁都市女性，非专业运动需求，兼顾日常穿搭" style="margin-top:8px"></textarea>
        </div>

        <!-- 生成结果区 -->
        <div id="generate-result"></div>
      </div>

      <!-- 模式A：市场浏览 -->
      <div id="panel-browse" style="display:none">
        <!-- 视图切换：按角色类型 | 按项目组 -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:11px;color:var(--text3);font-weight:600">视图</span>
          <div style="display:flex;background:var(--bg3);border-radius:8px;padding:2px;gap:2px">
            <button id="view-btn-type" class="view-toggle active" onclick="switchBrowseView('type')">
              🏷 按角色类型
            </button>
            <button id="view-btn-group" class="view-toggle" onclick="switchBrowseView('group')">
              📦 按项目组
            </button>
          </div>
        </div>

        <!-- 子视图A：按角色类型（原有 cat-tabs）-->
        <div id="browse-view-type">
          <div class="cat-tabs">
            <button class="cat-tab active" onclick="switchCatTab('user')" id="cattab-user">
              👤 用户类 <span class="badge" id="badge-user">0</span>
            </button>
            <button class="cat-tab" onclick="switchCatTab('stakeholder')" id="cattab-stakeholder">
              🌐 生态类 <span class="badge" id="badge-stakeholder">0</span>
            </button>
            <button class="cat-tab" onclick="switchCatTab('decision')" id="cattab-decision">
              🎯 权力类 <span class="badge" id="badge-decision">0</span>
            </button>
            <button class="cat-tab" onclick="switchCatTab('resource')" id="cattab-resource">
              🔧 资源类 <span class="badge" id="badge-resource">0</span>
            </button>
          </div>
          <div id="browse-cards" class="cards-grid"></div>
        </div>

        <!-- 子视图B：按项目组 -->
        <div id="browse-view-group" style="display:none">
          <div id="browse-groups-list"></div>
        </div>
      </div>

      <!-- 模式C：我的角色组 -->
      <div id="panel-groups" style="display:none">
        <div id="groups-list"></div>
      </div>

    </main>
  </div>
</div>

<!-- 详情抽屉 -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="persona-drawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title">角色详情</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer">
    <button class="drawer-footer-btn restore" id="drawer-restore-btn" onclick="restoreDrawerPersona()" style="display:none">↺ 恢复原版</button>
    <button class="drawer-footer-btn" onclick="addToGroupFromDrawer()">📦 加入角色组</button>
    <button class="drawer-footer-btn primary" onclick="closeDrawer()">完成</button>
  </div>
</div>

<!-- 角色组托盘 -->
<div class="group-tray" id="group-tray">
  <div class="tray-title">📦 角色组</div>
  <div class="tray-chips" id="tray-chips"></div>
  <div class="tray-actions">
    <button class="tray-btn" onclick="clearGroup()">清空</button>
    <button class="tray-btn" onclick="exportGroup()">📄 MD</button>
    <button class="tray-btn" onclick="exportCurrentGroupPdf()">🖨 PDF</button>
    <button class="tray-btn primary" onclick="syncToEureka()" title="将角色组同步回 Eureka 项目">🔗 同步到 Eureka</button>
  </div>
</div>

<!-- AI 配置模态框 -->
<div id="ai-config-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:480px;max-width:95vw;padding:28px;box-shadow:var(--shadow)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:17px;font-weight:700">⚙️ AI 大模型配置</h2>
      <button onclick="closeAIConfig()" style="width:28px;height:28px;border-radius:50%;background:var(--bg3);color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center">✕</button>
    </div>

    <div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:20px;font-size:12px;color:var(--text2);line-height:1.7">
      配置后可调用真实 AI 大模型生成角色，未配置时使用内置模板引擎。<br>
      支持 OpenAI 官方 API 及兼容接口（如 Azure OpenAI、DeepSeek、通义千问等）。
    </div>

    <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <label style="font-size:13px;color:var(--text2);font-weight:600">启用 AI 生成</label>
      <input type="checkbox" id="ai-enabled" style="width:16px;height:16px;accent-color:var(--accent)">
    </div>

    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:var(--text3);font-weight:600;display:block;margin-bottom:6px">提供商</label>
      <select id="ai-provider" style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px"
        onchange="toggleAIEndpoint()">
        <option value="openai">OpenAI（gpt-4o / gpt-4o-mini）</option>
        <option value="compatible">兼容接口（DeepSeek / 通义千问 / Azure…）</option>
      </select>
    </div>

    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:var(--text3);font-weight:600;display:block;margin-bottom:6px">API Key</label>
      <input type="password" id="ai-apikey" placeholder="sk-..." style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px">
    </div>

    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:var(--text3);font-weight:600;display:block;margin-bottom:6px">模型名称</label>
      <input type="text" id="ai-model" placeholder="gpt-4o-mini" style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px">
    </div>

    <div id="ai-endpoint-row" style="margin-bottom:14px;display:none">
      <label style="font-size:12px;color:var(--text3);font-weight:600;display:block;margin-bottom:6px">API Endpoint（兼容接口地址）</label>
      <input type="text" id="ai-endpoint" placeholder="https://api.deepseek.com/v1/chat/completions" style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px">
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button onclick="closeAIConfig()" style="padding:8px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer">取消</button>
      <button onclick="saveAIConfigUI()" style="padding:8px 18px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer">保存配置</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- Scripts -->
<script src="js/data-schema.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
